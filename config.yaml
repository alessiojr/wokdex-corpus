# =============================================================================
# WOKDEX Corpus — Configuração Central
# =============================================================================
# Este arquivo é lido por todos os scripts do projeto.
# Edite aqui para adicionar exercícios, mudar URLs, etc.

project:
  name: "WOKDEX Corpus"
  version: "1.0.0"
  description: "Corpus de referência para feedback formativo em juízes online"

# Artigo de referência
article:
  title: "Quebrando o Silêncio Pedagógico: O Modelo WOKDEX para Feedback Formativo em Juízes Online"
  title_en: "Breaking the Pedagogical Silence: The WOKDEX Model for Formative Feedback in Online Judges"
  venue: "SBIE 2026 — Simpósio Brasileiro de Informática na Educação"
  track: "Trilha de Pesquisa (TPIE)"
  year: 2026
  authors: "Omitido para revisão cega"

# Repositórios
repositories:
  gitlab:
    url: "https://git.juninho.com.br/mundo-do-codigo/wokdex-corpus"
    branch: "master"
  github:
    url: "https://github.com/alessiojr/wokdex-corpus"
    branch: "master"
    pages_url: "https://alessiojr.github.io/wokdex-corpus"

# Fonte de exercícios (para o script curate.py)
source:
  pack_tecnicas_path: "/dados/projetos/mundoDoCodigo/problemas/pack-tecnicas/workspace"

# Mapeamento de dificuldade → nível CS
cs_levels:
  cs1: ["E", "D"]
  cs2: ["C", "B"]
  cs3: ["A"]

# Exercícios incluídos no corpus
