description: O problema solicita a decomposição de um valor monetário em cédulas e moedas de denominações específicas, visando
  a menor quantidade total de unidades. É um exercício clássico de lógica e tratamento de precisão numérica.
editorial: A solução segue uma estratégia gulosa, processando as moedas da maior para a menor denominação. A principal dificuldade
  é a imprecisão inerente ao ponto flutuante; a melhor prática é multiplicar o valor por 100, arredondar para o inteiro mais
  próximo e realizar os cálculos em centavos usando divisores e o operador de módulo.
