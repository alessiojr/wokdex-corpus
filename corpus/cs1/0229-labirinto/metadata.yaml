slug: labirinto
authorSlugEditorial: alessio
authorSlugProblem: unknown
description: Problema clássico de descompressão RLE (Run-Length Encoding) em stream de caracteres. O núcleo algorítmico exige
  uma acumulação iterativa de dígitos ASCII para computar multiplicadores lineares sobre os tokens não numéricos subsequentes
  associados, em conjunto com o tratamento específico de quebra e espaçamento ('b', '!').
editorial: A estratégia ótima consiste em percorrer a string de entrada caractere por caractere em uma única passagem (O(N)).
  Deve-se manter um acumulador para a soma dos dígitos encontrados; ao encontrar um caractere não-dígito, imprime-se o caractere
  (ou espaço se for 'b') o número de vezes acumulado e reseta-se o contador. O caractere '!' deve disparar uma quebra de linha
  imediata sem consumir o acumulador de dígitos. UVA 445 (Marvelous Mazes).
successmsg: Implementação concluída com sucesso. O seu parser processou com êxito as transições sintáticas contínuas no regime
  ótimo.
difficultyLevelId: D
timeComplexity: O(N)
timeLimitSegs: 1
memoryLimitMb: 128
