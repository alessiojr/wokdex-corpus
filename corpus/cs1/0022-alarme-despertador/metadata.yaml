name: Alarme Despertador
origin: sbc-2009
slug: alarme-despertador
authorSlugEditorial: alessio
authorSlugProblem: sbc
description: Determina a defasagem temporal em minutos absolutos entre dois instantes isolados formatados em base 24h. O núcleo
  algorítmico requer modelagem aritmética cíclica combinada a varreduras contínuas (indeterminadas) terminadas por flags de
  limite estrito.
editorial: O problema alarme despertador é um problema que testa operações matemáticas de um controle condicional simples.
successmsg: Lógica consolidada com sucesso. Os intervalos temporais e as defasagens de limite cíclico foram avaliados perfeitamente.
difficultyLevelId: D
timeComplexity: O(1)
spaceComplexity: O(1)
