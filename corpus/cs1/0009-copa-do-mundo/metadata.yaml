slug: copa-do-mundo
authorSlugEditorial: alessio
authorSlugProblem: Unknown
description: Dado o número de times, o número total de partidas e a pontuação final de todos os times combinados, o desafio
  consiste em determinar, por meio de abstração matemática simples, a quantidade total de jogos que terminaram empatados.
  Uma demonstração clássica de como encontrar a resposta por meio de invariantes e propriedades de uma soma algébrica, sem
  a necessidade de simulação.
editorial: "Seja N o número total de jogos disputados e P_i os pontos do time i. Se todos os N jogos tivessem um vencedor,\
  \ a soma máxima de pontos distribuídos seria 3 × N. Cada empate reduz essa soma em 1 ponto, pois distribui apenas 2 pontos\
  \ (1 para cada time). Assim, se S = Σ P_i, então o número de empates é dado por: Empates = 3 × N − S. Basta ler T e N, somar\
  \ os pontos de todos os T times e aplicar essa fórmula para cada caso de teste.\r\n"
successmsg: Resolução validada! Sua modelagem matemática deduziu as diferenças absolutas e processou perfeitamente os limites
  de tempo propostos.
difficultyLevelId: D
timeComplexity: O(N)
