- id: c-no-pair-all-left
  name: 'Nenhum par: todas as botas do mesmo lado'
  description: 'Casos em que todas as botas são do mesmo lado (todas ''E'' ou todas ''D''), garantindo que o número de pares
    seja zero mesmo com muitos elementos.

    '
  helpTip: 'Não basta contar quantas botas existem; é preciso verificar se há pelo menos uma de cada lado para formar pares.
    Teste se sua lógica realmente exige um pé esquerdo e um pé direito do mesmo tamanho.

    '
  level: C
  testType: TDD
  skills:
  - points: 1
    skill: loops
- id: b-single-size-many-pairs
  name: Muitos pares do mesmo tamanho
  description: 'Lista com milhares de botas de um único tamanho, metade esquerdas e metade direitas, exercitando a contagem
    correta de pares quando há muitas combinações possíveis do mesmo tamanho.

    '
  helpTip: 'Pense em como calcular o número de pares para um mesmo tamanho sem tentar testar todas as combinações entre botas;
    usar a quantidade de esquerdas e direitas é suficiente.

    '
  level: B
  testType: TDD
  skills:
  - points: 1
    skill: arrays
- id: b-multi-sizes-balanced
  name: Vários tamanhos, pares bem distribuídos
  description: 'Casos com diferentes tamanhos entre 30 e 60, cada um com quantidades variadas de botas esquerdas e direitas,
    exigindo que a solução some corretamente min(E, D) para cada tamanho.

    '
  helpTip: 'Em vez de tentar parear botas individualmente, considere contar quantas esquerdas e direitas existem de cada tamanho
    e depois somar o mínimo de cada par de contadores.

    '
  level: B
  testType: TDD
  skills:
  - points: 1
    skill: arrays
- id: b-pares-repetidos
  name: Pares Repetidos
  description: Casos com múltiplos pares do mesmo tamanho para testar a contagem.
  helpTip: Você está contando todos os pares corretamente ou apenas o primeiro?
  level: B
  testType: TDD
  skills:
  - points: 1
    skill: loops
- id: a-performance
  name: Testes de Performance
  description: Casos de teste extremos para verificar a eficiência da solução.
