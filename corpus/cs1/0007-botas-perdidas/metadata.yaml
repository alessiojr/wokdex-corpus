editorial: O botas perdidas é um problema que é necesário um domino de laço de repetição, tem muitos casos diferntes que o
  aluno não percebe. Basicamente é um laço de repetição que usa string e número o aluno deve armazenar de alguma forma estas
  informações comprar e dar a resposta Existe uma resposta hiper eficiente que se passa usando um devor com o tamanho das
  botas e somando e subtraindo  de cada posição para ter o número de botas existentes.
