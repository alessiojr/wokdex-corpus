- id: b-unordered-input
  name: Entrada desordenada por tamanho e lado
  description: 'As botas chegam em ordem totalmente aleatória de tamanhos e lados, de modo que soluções que dependem de uma
    ordenação prévia da entrada podem falhar se não organizarem ou contarem corretamente.

    '
  helpTip: 'Não conte com a ordem em que os tamanhos aparecem; use estruturas como vetores indexados pelo tamanho ou outro
    mecanismo de agrupamento por M.

    '
  level: B
  testType: TDD
  skills:
  - points: 1
    skill: arrays
- id: c-edge-small-n
  name: Menor N possível e poucos pares
  description: 'Casos com N próximo do mínimo (por exemplo, 2, 3 ou 4 botas) para garantir que a solução trata corretamente
    listas muito pequenas e não faz acessos indevidos ou laços vazios.

    '
  helpTip: 'Teste sua solução com entradas mínimas (como N = 2) e verifique se a lógica de formação de pares funciona mesmo
    com poucos elementos.

    '
  level: C
  testType: TDD
  skills:
  - points: 1
    skill: io
