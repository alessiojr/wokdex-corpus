  name: Limite de botas (N = 10000)
  description: 'Casos com o máximo de botas permitido pelo problema (N = 10000), para garantir que a solução respeita o limite
    e não sofre estouro de buffer ou timeout.

    '
  helpTip: 'O enunciado define um limite máximo de botas; sua solução deve funcionar corretamente com exatamente 10000 botas
    na entrada.

    '
  level: A
  testType: TDD
  skills:
  - points: 1
    skill: complexity-analysis
- id: c-multi-cases-eof
  name: Múltiplos casos até EOF
  description: 'Vários conjuntos de N e listas de botas em sequência, sem linha sentinela especial, terminando apenas no fim
    do arquivo.

    '
  helpTip: 'Continue lendo casos enquanto houver dados na entrada; não presuma um número fixo de casos. Garanta que você zera
    corretamente os contadores para cada novo caso.

    '
  level: C
  testType: TDD
  skills:
  - points: 1
    skill: io
  - points: 1
    skill: loops
- id: c-loop
  name: Looping
