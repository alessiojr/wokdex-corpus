description: Você foi contratado pela Booble para analisar textos! Dada uma letra específica e uma frase completa, sua tarefa
  é identificar a porcentagem de palavras nessa frase que contêm a letra procurada. Uma ótima oportunidade para praticar formatação
  de E/S e manipulação básica de caracteres.
editorial: "**Briefing do Professor:**\r\nEste problema é ideal para turmas que estão iniciando o módulo de manipulação de\
  \ strings. O exercício exige que o aluno saiba fazer a leitura de uma linha inteira (lidando com espaços em branco), realize\
  \ a separação da string em tokens (split) e faça buscas de caracteres dentro de substrings. Ele se encaixa perfeitamente\
  \ como um exercício prático introdutório de nível D (Iniciante), testando fundamentos clássicos de E/S, laços de repetição\
  \ e conversão de tipos para o cálculo de porcentagens em ponto flutuante.\r\n\r\n**Resumo da Estratégia:**\r\nA solução\
  \ requer processamento linear O(N) sobre o texto fornecido. O primeiro passo é ler o caractere alvo e, depois, ler a linha\
  \ do texto completamente. O texto deve ser fatiado em uma lista de palavras utilizando o espaço como delimitador. Com a\
  \ lista em mãos, basta iterar sobre cada palavra verificando se o caractere alvo está presente. O total de palavras que\
  \ contém o caractere dividido pelo número total de palavras na frase, multiplicado por 100, fornece o resultado final. Um\
  \ ponto de atenção crítico comum é o arredondamento inadvertido ao fazer divisões de números inteiros, além do cuidado com\
  \ formatação de saída para exatamente uma casa decimal.\r\n*Para os detalhes completos de implementação, consulte o statement\
  \ de nível D.*\r\n"
