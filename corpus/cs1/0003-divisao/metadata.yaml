description: O algorítimo deve ler dois números e dividí-los, mas é preciso ter cuidado com a formatação dos números.
editorial: "O problema consiste em ler dois números e exibir o resultado da  divisão com duas casas decimais.\r\n\r\n**Pontos\
  \ de Atenção para o Professor:**\r\n - **Tipos de Variáveis**: Em linguagens tipadas (C, Java), a divisão de dois inteiros\
  \  resulta em um inteiro (truncamento). O aluno deve fazer o *cast* ou declarar as variáveis  como `float`/`double`. O caso\
  \ de teste `c-falso-positivo-inteiros` verifica esse erro.\r\n - **Arredondamento**: O sistema espera o rounding padrão\
  \ para a segunda casa  (ex: 16/9 = 1.777... -> 1.78). O caso `b-arredonda` testa especificamente isso.\r\n - **Dízimas**:\
  \ Entradas como 1 e 3 devem resultar em 0.33. O caso `a-dizima` verifica  se o aluno não está apenas truncando casas extras.\r\
  \n - **Precisão**: Existem casos de borda com números pequenos ou que exigem precisão,  testados em `b-reais-precisao`."
successmsg: Além de trabalhar com a skill de operators matemáticos você deu alguns passos iniciais em formatação de números.
