authorSlugProblem: sbc
description: O problema requer o processamento iterativo de rodadas binárias delimitadas por blocos dimensionais (N) e finalizadas
  por sentinela (N=0). O raciocínio central é aplicar uma contagem linear sequencial sobre a entrada O(N), acumulando ocorrências
  escalares distintas parciais.
editorial: A estratégia ótima demanda um modelo iterativo While gerido pelo limite sentinela (0). Lida-se estaticamente iterando
  no laço interno o scan do I/O, incrementando quantificadores locais via Switch/If condicional e emitindo sem alocar arrays
  massivos na memória.
successmsg: Contagem linear validada. Tratamento serial de buffer e laços aninhados foi corretamente implementado preservando
  a eficiência computacional mínima necessária.
