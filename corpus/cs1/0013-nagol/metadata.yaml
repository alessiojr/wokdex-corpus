authorSlugEditorial: alessio
authorSlugProblem: dami-henrique
description: Nagol é um designer de azulejos que aplica um padrão de riscos alternando entre as mãos direita e esquerda. O
  objetivo é calcular qual mão será utilizada em uma coordenada específica (X, Y) de uma grade L x C, seguindo uma ordem de
  preenchimento por linhas.
editorial: 'O problema pode ser resolvido mapeando a coordenada bidimensional (X, Y) para um índice linear k em uma grade
  de C colunas, usando a fórmula k = X * C + Y. Como Nagol começa com a mão direita no índice 0 (par) e alterna a cada azulejo,
  a paridade de k define o resultado: se k for par, a mão é ''Direita''; se for ímpar, é ''Esquerda''. Devido aos limites
  de L e C (10^5), o uso de inteiros de 64 bits é essencial para calcular k antes da operação de módulo.'
