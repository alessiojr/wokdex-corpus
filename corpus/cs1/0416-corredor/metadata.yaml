authorSlugEditorial: alessio
description: Nesta aventura, você precisa ajudar o personagem de Bruninho a atravessar um corredor repleto de salas consecutivas.
  Cada sala possui uma porta de entrada e saída, e passar por ela pode conceder vidas extras ou infligir dano! Sabendo os
  valores de vida de todas as salas, seu objetivo é descobrir qual a quantidade máxima possível de vidas que o personagem
  consegue acumular percorrendo um trecho contínuo em uma única passagem.
editorial: "**Briefing do Professor:**\r\nEste problema é a introdução perfeita à Programação Dinâmica unidimensional clássica,\
  \ focado no problema da Subsequência Contígua de Soma Máxima. O aluno precisa de conhecimentos básicos sobre arrays e laços\
  \ de repetição. É excelente para ser aplicado no início do módulo de Programação Dinâmica (DP) ou Algoritmos Gulosos, ajudando\
  \ a construir a intuição de sobreposição de subproblemas e subestrutura ótima de forma palpável, encaixando-se perfeitamente\
  \ em um nível intermediário na grade de algoritmos.\r\n\r\n**Resumo da Estratégia:**\r\nA intuição chave é perceber que\
  \ testar todos os trechos possíveis (pares de início e fim) levaria a uma complexidade quadrática O(N^2), inviável para\
  \ N = 50000. A solução correta exige o Algoritmo de Kadane. O raciocínio é simples: processamos as salas de forma linear,\
  \ da esquerda para a direita, mantendo um acumulador (`soma_atual`) e o melhor valor global (`soma_maxima`). A cada sala,\
  \ somamos a respectiva vida ao acumulador. O 'pulo do gato' é que, caso o acumulador se torne negativo, significa que o\
  \ trecho contíguo atual dá mais prejuízo do que lucro; logo, devemos reiniciar a soma a partir de zero na sala seguinte.\
  \ Isso garante a resposta ótima em tempo O(N) e espaço auxiliar O(1).\r\n*Para os detalhes completos de implementação e\
  \ dedução da lógica, consulte o statement de nível D.*\r\n"
