- id: b-reset-casos
  name: Múltiplos Casos de Teste
  description: Vários conjuntos de submissões em uma única execução para testar o reset de variáveis.
  helpTip: 'Isolamento de Buffer global (Lifecycle). Operadores contínuos até N=0 costumam causar vazamentos em variáveis
    auxiliares. Execute um flush ou zero out massivo (ex: memset) no hash/vetor a cada novo ciclo delimitado.'
  level: B
  testType: TDD
