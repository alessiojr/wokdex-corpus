  name: Submissões Únicas
  description: Cada problema possui apenas uma submissão, facilitando a depuração inicial.
  helpTip: Validação atômica O(1). Confirme se a sua lógica processa mutações diretas isoladas ignorando o motor de penalidades
    prévias inexistentes com sucesso total O(N) linear.
  level: C
  testType: TDD
  skills:
  - points: 1
    skill: condicionais
- id: c-pos-acerto
  name: Submissões Pós-Acerto
  description: Verifica se o sistema ignora corretamente submissões (corretas ou incorretas) após o primeiro acerto.
  helpTip: Tratamento de redundância (Falso-Positivo). Implemente barreiras lógicas booleanas para silenciar e invalidar ocorrências
    tardias associadas a identificadores que já tiveram seu estado final (resolvido) selado em passagens anteriores.
  level: C
  testType: TDD
  skills:
  - points: 1
    skill: condicionais
- id: b-nao-resolvidos
  name: Problemas Não Resolvidos
  description: Problemas com submissões incorretas que nunca foram resolvidos não devem somar penalidade.
  helpTip: Acúmulo diferido de passivo (Lazy Aggregation). Flutuações negativas apenas injetam mutação na variável global
    caso o trigger (correct) do token específico ocorra cronologicamente a posteriori. Falhas cruas pendentes morrem na memória.
  level: B
  testType: TDD
