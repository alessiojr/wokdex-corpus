slug: ajuda
authorSlugEditorial: alessio
authorSlugProblem: Unknown
description: Dado um log de submissões de uma competição de programação, calcule a quantidade de problemas resolvidos e a
  penalidade total de tempo seguindo as regras do ICPC.
editorial: O problema pede a implementação do sistema de pontuação padrão do ICPC. Para resolvê-lo, é necessário manter o
  estado de cada problema (de 'A' a 'Z'). Um array de booleanos pode indicar se o problema já foi resolvido, e um array de
  inteiros pode acumular as penalidades (20 min) de cada submissão incorreta. A regra crucial é que as penalidades de tempo
  de um problema só são somadas ao total geral se e quando o problema for resolvido ('correct'). Submissões após o primeiro
  'correct' de um mesmo problema devem ser ignoradas.
successmsg: Parabéns! Você implementou a lógica básica de um corretor de maratona de programação.
