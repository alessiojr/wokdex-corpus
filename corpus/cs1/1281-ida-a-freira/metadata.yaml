description: Simulação de compra em uma feira, calculando o valor total gasto com base nos preços e quantidades de produtos.
editorial: "O problema é um exercício clássico de mapeamento e acumulação. O foco é a utilização de uma estrutura de dados\
  \ de busca rápida (Mapa/Dicionário/Hash) para associar nomes de produtos a seus preços.\r\n\r\n**Pontos de Atenção:**\r\n\
  - **Precisão**: O uso de ponto flutuante exige cuidado. Recomenda-se `double` em C++ ou garantir que o acumulador não perca\
  \ precisão em muitas somas.\r\n- **Busca Eficiente**: Alunos que usam busca linear O(M) para cada um dos P itens podem ter\
  \ problemas de performance se os limites forem altos.\r\n- **Formatação**: O prefixo 'R$ ' e as duas casas decimais são\
  \ obrigatórios."
successmsg: Parabéns! Você dominou o uso de estruturas de chave-valor (Mapas/Dicionários) para resolver problemas de busca
  e associação de dados de forma eficiente.
