authorSlugEditorial: alessio
authorSlugProblem: alessio
description: Implemente uma calculadora simples que realiza multiplicação ou divisão de dois números reais.
description_long:
  O programa deve ler um caractere de operação ('M' ou 'D') e dois números reais, executando a multiplicação
  ou divisão conforme solicitado e exibindo o resultado com 2 casas decimais.
editorial:
  "O problema exige o uso de estrutura condicional (`if/else` ou `switch`) para decidir qual operação matemática\
  \ realizar.  \r\n\r\n1. Leia um caractere que define a operação.\r\n2. Leia dois números reais (A e B).\r\n3. Se o caractere\
  \ for 'M', calcule $R = A \\times B$.\r\n4. Se o caractere for 'D', calcule $R = A / B$.\r\n5. Imprima $R$ formatado com\
  \ duas casas decimais (ex: `%.2f` em C/Python ou `String.format` em Java)."
successmsg: Ótimo trabalho! Você aprendeu a combinar entrada de caracteres com operações aritméticas condicionais.
