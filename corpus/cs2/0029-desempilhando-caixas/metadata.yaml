name: Desempilhando Caixas
slug: desempilhando-caixas
timelimit: 1.0
memlimit: 256
difficultyLevelId: C
author: Maratona SBC
origin: Maratona de Programação da SBC – ACM ICPC – 2007 (Problema F)
description: Dadas N caixas em P pilhas arrumadas em fila, determine o número mínimo de caixas a desempilhar para recuperar
  a caixa 1, respeitando as restrições de acesso (topo e lado livre).
editorial: 'Localize a caixa 1 em sua pilha e posição. Para cada direção (esquerda/direita), calcule o custo: caixas acima
  na mesma pilha + excesso de altura das pilhas adjacentes até encontrar um lado livre. A resposta é o mínimo entre os dois
  lados. Complexidade O(N) por caso.'
successmsg: Parabéns!
timeComplexity: O(N)
