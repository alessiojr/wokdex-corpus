description: Processamento de estabilidade estrutural utilizando Radix Sort. O fluxo lógico exige modulação posicional em
  O(N) sobre blocos de base 100.000, e espelhamento em tempo real das mutações do array.
editorial: A ideia do Radix Sort é fazer a classificação dígito por dígito. Neste problema, classificamos os números em blocos
  de 5 dígitos (base 100.000) e exibimos o vetor após cada passagem.
successmsg: Ordenação validada com sucesso. A matriz original foi estritamente espelhada sem perdas de estabilidade nas partições
  modulares consecutivas.
