---
version: '1.0'
id: 389
name: Letras
origin: obi-n2-2015-f2
slug: letras-o15
description: Neste problema você recebe uma cadeia de caracteres (contendo letras de 'A' a 'Z') e precisa encontrar o tamanho
  da maior subsequência que forma uma sequência crescente de letras no alfabeto (permitindo letras iguais). Este é um desafio
  clássico que exige otimização para lidar com entradas grandes!
editorial: "Pedagogicamente, este é um problema essencial para o ensino avançado de Programação Dinâmica, modelando o clássico\
  \ algoritmo de Longest Increasing Subsequence (LIS). É recomendado para alunos que já dominam conceitos básicos de algoritmos\
  \ e precisam explorar limites de tempo restritos, se encaixando bem em currículos de algoritmos avançados.\r\n\r\nA chave\
  \ do problema é notar que uma abordagem ingênua em O(N^2) será reprovada para N até 300.000. O estudante deve combinar Programação\
  \ Dinâmica com Busca Binária, mantendo um vetor auxiliar que armazena a menor letra final possível para subsequências de\
  \ cada comprimento. Usando busca binária (como `upper_bound`), atualiza-se o vetor em tempo O(log N) para cada caractere.\
  \ Isso garante a complexidade final de O(N log N). Para detalhes completos de implementação, consulte o enunciado de nível\
  \ D.\r\n"
successmsg: Excelente! Você dominou o algoritmo LIS em O(N log N) e lidou perfeitamente com os limites rigorosos de tempo!
