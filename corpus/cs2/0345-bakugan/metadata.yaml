description: Mark e Leti jogam bolas Bakugan em uma competição de R rodadas. O objetivo é calcular a pontuação total considerando
  um bônus de 30 pontos para o primeiro jogador a conseguir três monstros idênticos consecutivos, desde que o oponente não
  consiga o mesmo feito na mesma rodada.
editorial: A solução requer a simulação das R rodadas, acumulando os pontos de cada monstro. Deve-se monitorar sequências
  de três monstros iguais para ambos os jogadores. O bônus de 30 pontos é atribuído apenas ao primeiro jogador que completar
  a sequência, a menos que ambos completem na mesma rodada, caso em que ninguém recebe o bônus.
