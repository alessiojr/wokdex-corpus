authorSlugProblem: gabriel
description: >
  O pequeno país de Tumbólia vai às Olimpíadas de Pequim pela primeira vez! O Comitê
  Olímpico precisa transportar todos os seus atletas usando apenas os voos disponíveis
  da Air Rock — cada rota tem um número fixo de assentos livres por dia. Dado o mapa
  de voos e a quantidade de atletas, descubra o menor número de dias necessário para
  que toda a delegação chegue a Pequim.
editorial: >
  **Briefing para o Professor:**
  Este problema é ideal para introduzir Fluxo Máximo em Grafos após os alunos já
  dominarem grafos dirigidos e BFS. O pré-requisito essencial é entender modelagem
  de redes de capacidade (fonte, sumidouro, arestas com peso). É classificado como
  nível B (Especialista): requer conhecimento do algoritmo de Ford-Fulkerson ou
  Edmonds-Karp, conceito que normalmente aparece no segundo semestre de um curso de
  Algoritmos em Grafos. Não há implementação de estrutura de dados exótica, mas exige
  maturidade para depurar grafos residuais.

  **Resumo da Estratégia:**
  A chave do problema é perceber que a rede de voos é idêntica a cada dia — logo, o
  número máximo de atletas transportados por dia é constante e igual ao Fluxo Máximo
  do grafo (aeroporto 1 = fonte, aeroporto N = sumidouro, capacidades = assentos
  vagos por voo). A resposta é ⌈A / fluxo_max⌉. Implemente Edmonds-Karp
  (Ford-Fulkerson + BFS) para garantir O(V·E²) com V≤50, E≤2450 — suficiente para
  o limite de 1 segundo. Atenção ao grafo residual: arestas inversas com capacidade
  igual ao fluxo já enviado. Para detalhes completos de implementação, consulte o
  enunciado nível D.
successmsg: Excelente! Você dominou o transporte olímpico modelando a rede como fluxo máximo!
