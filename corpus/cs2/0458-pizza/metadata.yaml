authorSlugEditorial: alessio
description: Nesta tarefa, você precisará ajudar o Rodrigo a encontrar a fatia contínua de pizza que possua a maior diferença
  a favor de cebolas em relação às azeitonas. Lembre-se de que a pizza tem formato circular e a fatia que você escolher pode
  dar a volta, conectando o final ao início!
editorial: "**Briefing do Professor:**\r\nEste problema é um excelente exercício intermediário para consolidar o entendimento\
  \ de Programação Dinâmica unidimensional e raciocínio de vetores, focando no problema da Subsequência Contígua de Soma Máxima.\
  \ O aluno precisa ter familiaridade com arrays e com o Algoritmo de Kadane básico. A transição para um array circular o\
  \ torna um ótimo exemplo para exercitar a lógica espacial e de complementos, encaixando-se perfeitamente após a introdução\
  \ de Algoritmos Gulosos ou DP.\r\n\r\n**Resumo da Estratégia:**\r\nA intuição chave é perceber que a maior fatia pode estar\
  \ no centro do array ou cruzando as bordas. Para o centro, basta rodar o Kadane normal (buscando a maior soma). Para as\
  \ bordas, a lógica é baseada em complementos matemáticos: o melhor pedaço pelas bordas equivale à pizza inteira menos o\
  \ *pior* pedaço no meio. Portanto, calculamos o total do array e subtraímos o resultado de um Kadane invertido (que busca\
  \ a menor soma contígua). O resultado final será o valor máximo entre o Kadane normal e a diferença (Total - Kadane Invertido).\
  \ Cuidado especial com o edge case onde todos os elementos são negativos.\r\n*Para os detalhes completos de implementação\
  \ e dedução lógica, consulte o statement de nível D.*\r\n"
