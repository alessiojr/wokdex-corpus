name: Pedido de Desculpas
origin: obi-sr-2005-f1
slug: pedido-de-desculpas
authorSlugEditorial: alessio
description: Você foi escolhido para ajudar a salvar o namoro de Cuca! Ele tem um cartão de floricultura com espaço limitado
  e uma lista de frases contendo 'desculpe'. Sua tarefa é calcular qual é a maior quantidade de vezes que a palavra 'desculpe'
  pode aparecer no cartão, escolhendo as frases certas sem ultrapassar o limite de caracteres.
editorial: "**Briefing do Professor:**\r\nEste problema é uma excelente introdução ao conceito de Programação Dinâmica, especificamente\
  \ a variação clássica da Mochila 0/1 (0/1 Knapsack). Ele exige que o estudante reconheça que uma abordagem gulosa (ordenar\
  \ pelo custo-benefício) pode falhar e formule a solução testando a inclusão ou exclusão de itens baseado na capacidade restante.\
  \ Ideal para níveis intermediários e avançados após o domínio de recursão e introdução à memoização ou DP tabular.\r\n\r\
  \n**Resumo da Estratégia:**\r\nA chave é modelar o problema como a Mochila 0/1, onde o limite de caracteres do cartão é\
  \ a capacidade total da mochila, o tamanho de cada frase é o peso do item, e o número de vezes que a palavra 'desculpe'\
  \ aparece é o valor do item. Como não podemos usar a mesma frase mais de uma vez, cada item tem a escolha binária de entrar\
  \ ou não na composição ótima (por isso 0/1). Criamos um estado para calcular a resposta máxima considerando as *i* primeiras\
  \ frases e uma capacidade *j*. Isso também pode ser otimizado para um array unidimensional, atualizado de trás para frente.\
  \ Complexidade de tempo O(F*C).\r\n*Para os detalhes completos de implementação, consulte o statement de nível D.*\r\n"
successmsg: Parabéns! Você encontrou a melhor combinação de frases e salvou o namoro do Cuca!
