  name: Consultas Contíguas
  description: Testa o caso onde uma consulta termina exatamente no mesmo instante em que a próxima começa.
  helpTip: Validação matemática limítrofe (Edge Constraint). As equações booleanas de compatibilidade exigem checagem >= em
    vez de restritas. O novo 'Start' poderá perfeitamente tangenciar o antigo 'End'.
  level: C
  testType: TDD
  skills:
  - skill: greedy-algorithms
    points: 1
- id: b-single-case
  name: Caso Unitário
  description: Testa o limite inferior com apenas uma consulta agendada.
  helpTip: Tratamento de Base Case. Condicionadores iterativos e laços não podem gerar NullPointerException vazios num escopo
    limítrofe unitário N=1. Assegure a proteção O(1) precoce.
  level: B
  testType: TDD
  skills:
  - skill: arrays
    points: 1
- id: b-wrong-sorting
  name: Estratégia de Ordenação
  description: Testa casos onde ordenar por início ou duração falha, garantindo que o aluno ordenou por término.
  helpTip: Detecção de Custom Comparator inconsistente. A matemática algorítmica gulosa falha drasticamente se a fila primária
    priorizar (Start) ou (Delta). Configure sua rotina de Sort apontando rigidamente para a coluna global (End).
  level: B
  testType: TDD
  skills:
  - skill: greedy-algorithms
    points: 1
  - skill: sorting
    points: 1
- id: a-max-volume
  name: Volume Máximo de Dados
  description: Testa a robustez da solução com o limite máximo de 10.000 consultas e dados aleatórios.
  helpTip: Cenário TLE (Time Limit Exceeded). Reavaliações contínuas de escopos passados (for aninhado O(N^2)) falharão no
    limite N=10000. Despache as amostras em ordenadores padrão da biblioteca base em rigor O(N log N).
  level: A
