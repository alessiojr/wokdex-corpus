name: Dentista
origin: obi-n2-2010-f1
slug: dentista
authorSlugEditorial: alessio
description: Otimização de agendamento (Interval Scheduling) utilizando paradigma guloso (Greedy). O fluxo lógico visa encontrar
  o subconjunto máximo de matrizes não-sobrepostas, exigindo ordenação prévia por limite de offset seguida por roteirização
  linear O(N).
editorial: Para resolver este problema de seleção de intervalos (Interval Scheduling), utilize uma abordagem gulosa. Primeiro,
  ordene todas as consultas pelo horário de término (Y). Em seguida, itere sobre elas, selecionando sempre a primeira consulta
  que não se sobrepõe ao término da última selecionada.
successmsg: Mapeamento validado. A estratégia gulosa maximizou com eficiência a seleção de intervalos O(N log N) e lidou estritamente
  com os limites condicionais.
difficultyLevelId: C
timeComplexity: O(N logN)
timeLimitSegs: 1
memoryLimitMb: 256
